id: emotion_abc
name: 情緒ABC練習
description: 練習辨識事件、情緒與想法之間的關係
instructions: |
  請想一想最近發生的一件事情，然後寫下：
  1. 發生了什麼事？（事件）
  2. 你當時的感覺是什麼？（情緒）
  3. 你心裡在想什麼？（想法）

schema:
  fields:
    - name: event
      type: text
      label: 發生了什麼事？（事件）
      placeholder: 例如：下課時想加入同學的遊戲，但他們說人已經夠了
      required: true
      min_length: 10
    - name: emotion
      type: text
      label: 你當時的感覺是什麼？（情緒）
      placeholder: 例如：難過、生氣、開心、害怕...
      required: true
    - name: thought
      type: text
      label: 你心裡在想什麼？（想法）
      placeholder: 例如：他們一定是不喜歡我，所以才不讓我玩
      required: true
      min_length: 10

rubric:
  completeness:
    "5": 所有欄位完整填寫，事件描述具體，情緒明確，想法有實質內容
    "4": 所有欄位皆有填寫，內容充實但某一項稍嫌簡略
    "3": 所有欄位皆有填寫，但部分內容較為簡短
    "2": 有欄位未填或僅填寫極少文字
    "1": 大部分欄位空白或僅填一兩個字
  correctness:
    "5": 情緒與事件高度對應，想法合理反映內在認知
    "4": 情緒與事件對應良好，想法大致合理
    "3": 情緒與事件基本對應，但想法與情緒的連結不夠清晰
    "2": 情緒與事件對應不太合理，或想法與情緒無關
    "1": 情緒、事件、想法三者明顯不相關
  depth:
    "5": 能深入反思情緒與想法的連結，展現自我覺察能力
    "4": 有一定程度的反思，能說出具體的內在想法
    "3": 有基本的情緒覺察，但缺乏深入思考
    "2": 回答表面化，缺乏反思
    "1": 無法看出任何反思或覺察
  expression:
    "5": 描述具體清晰，用詞恰當，能生動表達感受
    "4": 描述清楚，表達流暢
    "3": 描述尚可理解，但不夠具體
    "2": 描述模糊，難以理解具體情境
    "1": 幾乎無法理解所描述的內容
  appropriateness:
    "5": 情緒詞彙準確，想法真實反映國小學生的認知特徵
    "4": 情緒詞彙恰當，想法符合學生年齡
    "3": 情緒詞彙基本正確，想法尚屬合理
    "2": 情緒詞彙使用不太恰當
    "1": 情緒詞彙明顯錯誤或不適齡

feedback_style:
  tone: 溫暖、鼓勵、具體
  guidelines:
    - 先肯定學生做得好的地方（至少一項具體優點）
    - 用「你可以試試看...」而非「你做錯了...」
    - 給出一個具體可行的改進建議
    - 用國小學生能理解的語言
    - 長度控制在 80-150 字
  examples:
    - |
      你寫得很棒喔！你能清楚地描述出發生了什麼事，而且「難過」這個情緒詞用得很準確。
      你心裡的想法也寫得很具體，老師可以感受到你當時的心情。
      下次你可以試試看，除了「他們不喜歡我」這個想法之外，有沒有其他可能的原因呢？
      例如也許他們真的人太多了。多想幾個可能性，會讓心情好一點喔！
    - |
      謝謝你願意分享你的經驗！你寫出了事件和情緒，這很好。
      老師想給你一個小建議：你的想法那邊可以寫得更具體一些。
      例如你當時心裡可能在想「為什麼我考這麼差」或「媽媽會不會罵我」，
      試著把那個時候腦海裡的聲音寫出來，這樣練習會更有幫助喔！
