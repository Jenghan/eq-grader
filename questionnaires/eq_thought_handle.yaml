id: eq_thought_handle
name: EQ練功房：想法心手把
description: 運用「想法心手把」來覺察情緒、找出背後的想法，並培養平靜與希望的彈性思維
instructions: |
  在生活中難免會遇到讓人困擾的事件，此時可以運用「想法心手把」來幫助自己覺察情緒、
  找出背後的想法，並進一步提升想法的彈性，產生能讓自己感到平靜與希望的想法。
  使用情緒轉盤覺察多種情緒，找出背後想法，並培養平靜與希望的彈性思維。
  要練習找正面情緒，不能全部都是負面情緒。

schema:
  fields:
    - name: event
      type: text
      label: 發生了什麼事？（事件）
      placeholder: 描述一件讓你困擾或有感覺的事情
      required: true
      min_length: 10
    - name: emotion_slots
      type: emotion_wheel
      label: 情緒轉盤
      slot_count: 8
      required: true
      slot_schema:
        - name: color
          type: text
          label: 顏色
        - name: emotion
          type: text
          label: 情緒
        - name: thought
          type: text
          label: 想法
        - name: slot_number
          type: integer
          label: 格子編號
      fixed_slots:
        7:
          color: 綠色
          emotion: 平靜
          thought_hint: 寫出能幫助自己回到平靜的想法
        8:
          color: 黃色
          emotion: 希望
          thought_hint: 寫出能產生希望感受的想法
      rules:
        - 第1-6格的情緒需包含正面和負面情緒，不能全部都是負面的
        - 第7格固定為綠色/平靜
        - 第8格固定為黃色/希望
        - 每個格子都需要填寫對應的想法

rubric:
  completeness:
    "5": 8個格子全部完整填寫，事件描述具體，每格都有顏色、情緒和想法
    "4": 所有格子皆有填寫，大部分內容充實
    "3": 大部分格子有填寫，但部分想法較簡略
    "2": 有多個格子未填或內容極少
    "1": 大部分格子空白
  correctness:
    "5": 情緒與顏色搭配合理，第7-8格正確，正負面情緒均有包含
    "4": 大致正確，第7-8格正確，有正負面情緒
    "3": 基本正確但有小錯誤（如第7-8格填錯，或全部負面情緒）
    "2": 多處錯誤，格式不符要求
    "1": 明顯不理解題目要求
  depth:
    "5": 每個想法都具體且有深度，平靜與希望的想法展現思維彈性
    "4": 大部分想法具體，平靜與希望的想法合理
    "3": 有基本的想法描述，但缺乏深度
    "2": 想法表面化或重複
    "1": 無法看出思考過程
  expression:
    "5": 描述生動具體，能清楚表達每個情緒背後的想法
    "4": 描述清楚，表達流暢
    "3": 描述尚可理解，但不夠具體
    "2": 描述模糊
    "1": 幾乎無法理解
  appropriateness:
    "5": 情緒多樣且貼切事件，從負面到正面的思維轉變自然合理
    "4": 情緒搭配大致恰當，思維轉變合理
    "3": 情緒搭配基本合理
    "2": 部分情緒與事件不太對應
    "1": 情緒與事件明顯不符

feedback_style:
  tone: 溫暖、鼓勵、具體
  guidelines:
    - 先肯定學生做得好的地方（至少一項具體優點）
    - 特別關注平靜和希望格子的想法品質
    - 鼓勵正負面情緒的平衡
    - 用「你可以試試看...」而非「你做錯了...」
    - 給出一個具體可行的改進建議
    - 用國小學生能理解的語言
    - 長度控制在 100-200 字（因為此問卷較複雜）
  examples:
    - |
      哇，你好棒！你能想到這麼多不同的情緒，而且正面和負面的都有，這表示你很會觀察自己的心情。
      老師特別喜歡你在「平靜」那格寫的想法：「深呼吸，告訴自己沒關係」，這是很棒的方法喔！
      一個小建議：你的「希望」格可以寫得更具體一些，例如想想看未來可以怎麼做，
      像是「下次我可以先問問看有沒有什麼我能幫忙的」，這樣希望的感覺會更強烈喔！
